apiVersion: apps/v1
kind: Deployment
metadata:
    name: backend-deployment
    labels:
        app: backend
spec:
    replicas: 3
    selector:
        matchLabels:
            app: backend
    template:
        metadata:
            labels:
                app: backend
        spec:
            containers:
                - name: backend
                  image: brymat24/test-app-backend:v2
                  ports:
                      - containerPort: 8000
                  env:
                      - name: DOWNSTREAM_URL
                        valueFrom:
                            configMapKeyRef:
                                name: backend-cfg
                                key: DOWNSTREAM_URL

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
    - namespace.yaml

helmCharts:
    - name: kube-prometheus-stack
      repo: https://prometheus-community.github.io/helm-charts
      version: 87.16.1
      releaseName: prometheus
      namespace: dev-monitoring
      valuesFile: values.yaml
      includeCRDs: true
